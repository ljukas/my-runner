appId: se.lukaslindqvist.runbro.e2e
tags:
  - session
---
- runFlow: ../helpers/start-first-session.yaml
- extendedWaitUntil:
    visible:
      text: "Nice work.*"
    timeout: 120000
# Every session is bracketed by a warm-up — the finished run's segment key names
# it in the summary's colour legend. Asserted here, on the settled summary, not
# on the run screen: the compressed warm-up is ~5 s and races Maestro's poll
# across the modal transition, so a run-screen "Warm Up" check is inherently
# flaky. scrollUntilVisible (not a bare assertVisible) so the legend — the last
# card, below the stat grid — is reached even if it sits below the fold.
# "Warm Up" is Title Case (SEGMENT_KIND_LABEL, renamed in the HIG-audit PR).
- scrollUntilVisible:
    element:
      text: "Warm Up"
- tapOn: "Done"
- tapOn: "Log"
- scrollUntilVisible:
    element:
      text: "Week 1 · Day 1"
- tapOn: "Plan"
# The next-session marker is an icon-only arrow — no text to target (ADR 0016).
- assertVisible:
    id: "plan-next-w1d2"
