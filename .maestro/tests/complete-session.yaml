appId: se.lukaslindqvist.runbro.e2e
tags:
  - session
---
- runFlow: ../helpers/start-first-session.yaml
# Every session opens with a warm-up segment. Poll (extendedWaitUntil) rather
# than a bare assertVisible: the run screen animates continuously (Skia
# countdown + progress bar), and a single assertVisible waits for that
# animation to settle — which only happens with Reduce Motion enabled (CI does
# this; see .github/workflows/e2e.yml). Polling reads the hierarchy directly,
# so it catches the warm-up phase on the live screen without the settle wait —
# the same pattern the "Nice work" wait below and log-revisit already rely on.
# "Warm Up" is Title Case (SEGMENT_KIND_LABEL).
- extendedWaitUntil:
    visible:
      text: "Warm Up"
    timeout: 10000
- extendedWaitUntil:
    visible:
      text: "Nice work.*"
    timeout: 120000
- tapOn: "Done"
- tapOn: "Log"
- scrollUntilVisible:
    element:
      text: "Week 1 · Day 1"
- tapOn: "Plan"
# The next-session marker is an icon-only arrow — no text to target (ADR 0016).
- assertVisible:
    id: "plan-next-w1d2"
