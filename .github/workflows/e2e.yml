name: E2E

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  precheck:
    # Decide whether the change is app-affecting (run E2E) or provably docs-only
    # (skip). Always runs, and is a REQUIRED check — so a failure here blocks the
    # PR and can't let e2e-ios skip-to-success without testing. A job skipped by
    # `if:` (docs-only) reports success and satisfies its required check.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run: ${{ steps.decide.outputs.run }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Decide whether app-affecting files changed
        id: decide
        run: bun .github/scripts/decide-run.ts

  e2e-ios:
    needs: precheck
    if: needs.precheck.outputs.run == 'true'
    # macos-26 (default Xcode 26.x) — Expo SDK 57 / RN 0.86 require Xcode 26;
    # macos-15 tops out at Xcode 16.4 and fails building the ExpoModulesJSI
    # xcframework. Still a standard runner → free/unlimited on public repos.
    runs-on: macos-26
    env:
      APP_VARIANT: e2e
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Set up Java (Maestro requires a JDK)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies (frozen)
        run: bun ci

      - name: Compute native fingerprint
        id: fp
        run: |
          HASH=$(npx expo-updates fingerprint:generate --platform ios 2>/dev/null | jq -r '.hash')
          if [ -z "$HASH" ] || [ "$HASH" = "null" ]; then
            echo "::error::fingerprint generation failed"; exit 1
          fi
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
          echo "Native fingerprint: $HASH"

      - name: Restore cached native .app (keyed by fingerprint)
        id: cache
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/native-app
          key: e2e-native-app-ios-${{ steps.fp.outputs.hash }}

      - name: Build E2E simulator app (cache miss — full native build, zero EAS cloud minutes)
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: bash .github/scripts/build-e2e-sim-app.sh "$RUNNER_TEMP/native-app"

      - name: Repack cached .app with current JS (cache hit — no native build)
        if: steps.cache.outputs.cache-hit == 'true'
        id: repack
        continue-on-error: true
        env:
          # Must mirror the e2e-simulator profile's `env` in eas.json: repack
          # re-bundles JS via `expo export:embed`, which inlines EXPO_PUBLIC_* at
          # bundle time. Without this the repacked app runs the real NHS plan
          # (not the compressed one) and full-session flows time out.
          EXPO_PUBLIC_E2E: '1'
        run: |
          npx @expo/repack-app --platform ios \
            --source-app "$RUNNER_TEMP/native-app/app.app" \
            -o "$RUNNER_TEMP/repacked.app"

      - name: Fallback to a full build (repack failed)
        if: steps.cache.outputs.cache-hit == 'true' && steps.repack.outcome == 'failure'
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "::warning::@expo/repack-app failed; falling back to a full native build"
          bash .github/scripts/build-e2e-sim-app.sh "$RUNNER_TEMP/fallback"

      - name: Boot simulator and install app
        id: sim
        run: |
          if [ "${{ steps.cache.outputs.cache-hit }}" = "true" ] && [ "${{ steps.repack.outcome }}" != "failure" ]; then
            APP_PATH="$RUNNER_TEMP/repacked.app"
          elif [ "${{ steps.cache.outputs.cache-hit }}" = "true" ]; then
            APP_PATH="$RUNNER_TEMP/fallback/app.app"
          else
            APP_PATH="$RUNNER_TEMP/native-app/app.app"
          fi
          echo "Installing: $APP_PATH"
          UDID=$(xcrun simctl list devices available --json \
            | jq -r '[.devices[][] | select(.name | test("^iPhone"))] | last | .udid')
          echo "Simulator UDID: $UDID"
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          xcrun simctl install "$UDID" "$APP_PATH"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Enable Reduce Motion (so Maestro can settle on the animated run screen)
        run: |
          # The run screen animates continuously (Skia countdown + Reanimated
          # progress bar), so Maestro's screenshot-based "wait for animation to
          # end" never settles — each interaction stalls ~40s, long enough for the
          # seconds-long compressed session to finish underneath the run-controls
          # flow. Reduce Motion collapses both animations to instant (the app
          # honours it by default: Reanimated withTiming and number-flow both
          # respect the system setting), so the screen settles and Maestro
          # interacts reliably. Maestro's own disableAnimations flag is cloud-only,
          # so set it on the simulator directly. Maestro cold-launches the app for
          # each flow, so it is read at launch.
          xcrun simctl spawn "${{ steps.sim.outputs.udid }}" defaults write com.apple.Accessibility ReduceMotionEnabled -int 1

      - name: Install Maestro
        run: |
          curl -fsSL "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run Maestro suite
        run: maestro --device "${{ steps.sim.outputs.udid }}" test .maestro/

      - name: Upload Maestro artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-output
          path: ~/.maestro/tests/**
          if-no-files-found: ignore
