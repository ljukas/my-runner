appId: se.lukaslindqvist.runbro.e2e
---
# Onboarding is two steps: the welcome, then the spoken-coach intro (audio-cues-v1).
# Assert each step's unique copy, tap its one CTA, and land on the next.
- assertVisible: "Welcome to"
# Retry the tap + its landing assertion together: the E2E build's larger binary
# (Skia/Reanimated) launches slowly, so a screen can be visible but not yet
# interactive when Maestro taps — the tap silently no-ops. Re-tapping until the
# next screen appears absorbs that transient miss instead of failing the flow.
- retry:
    maxRetries: 3
    commands:
      - tapOn: "Continue"
      - assertVisible: "running coach" # audio-cues step heading
- retry:
    maxRetries: 3
    commands:
      - tapOn: "Continue"
      - assertVisible: "Week 1 ·.*" # plan list
