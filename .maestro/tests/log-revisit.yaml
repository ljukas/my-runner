appId: se.lukaslindqvist.runbro.e2e
tags:
  - session
---
- runFlow: ../helpers/start-first-session.yaml
# Finish the (compressed) session.
- extendedWaitUntil:
    visible:
      text: "Nice work.*"
    timeout: 120000
- tapOn: "Done"
# Revisit from the Log tab.
- tapOn: "Log"
- tapOn:
    text: "Week 1 · Day 1"
# The revisit header is neutral — the celebratory line must be absent.
- assertVisible:
    text: "Week 1 · Day 1"
# "intervals" matches the Intervals tile header (IGNORE_CASE); "running"/
# "active" would collide with the tab bar's "Running" a11y label / other copy.
- assertNotVisible:
    text: "Nice work.*"
- assertVisible: "intervals"
# Dismiss with the summary's native gesture. It is presented modally
# (presentation: 'modal' in _layout — an iOS page sheet), so the dismissal is a
# swipe *down*, not a left-edge back-swipe (a card gesture the sheet ignores).
# The only other control is the icon-only xmark toolbar button, which has no
# text-first target (ADR 0016). Start the drag on the large-title bar, above the
# scroll content, so it pulls the sheet down instead of scrolling it.
- swipe:
    start: "50%, 12%"
    end: "50%, 92%"
    duration: 600
- assertNotVisible: "intervals"
- assertVisible:
    text: "Week 1 · Day 1"
