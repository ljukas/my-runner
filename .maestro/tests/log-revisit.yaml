appId: se.lukaslindqvist.runbro.e2e
tags:
  - session
---
- runFlow: ../helpers/start-first-session.yaml
# Finish the (compressed) session.
- extendedWaitUntil:
    visible:
      text: "Nice work.*"
    timeout: 120000
- tapOn: "Done"
# Revisit from the Log tab.
- tapOn: "Log"
- tapOn:
    text: "Week 1 · Day 1"
# The revisit header is neutral — the celebratory line must be absent.
- assertVisible:
    text: "Week 1 · Day 1"
# "intervals" is a stat-tile unit; "running"/"active" would collide with the
# tab bar's "Running" a11y label / other copy under full-string IGNORE_CASE.
- assertNotVisible:
    text: "Nice work.*"
- assertVisible: "intervals"
- tapOn: "Done"
- assertNotVisible: "intervals"
- assertVisible:
    text: "Week 1 · Day 1"
