appId: se.lukaslindqvist.myrunner
---
# `SettingsToggle` renders the label and switch as separate views, so the switch
# is its own accessibility element and a tap by id lands on it directly. This
# retired the old `85%,27%` point tap (a bare @expo/ui Toggle merged label+switch
# into one row whose centre was a dead zone). Assert the checked state so a
# regression fails loudly instead of silently running the real (slow) plan.
- tapOn: "Settings"
- assertVisible: "Compressed plan"
- tapOn:
    id: "settings-compressed-plan"
- assertVisible:
    id: "settings-compressed-plan"
    checked: true
- tapOn: "Plan"
