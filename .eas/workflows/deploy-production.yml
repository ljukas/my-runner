# Fingerprint-gated production deploy (ADR 0012), based on Expo's official
# deploy-to-production example. Dispatched by .github/workflows/release.yml
# when a release-please release PR merges — never runs on ordinary pushes.
#
# Per platform: if a store build already exists with the current fingerprint,
# the release ships as an OTA update; otherwise a native build is created and,
# after manual approval, submitted to the store.
name: Deploy to production

on:
  workflow_dispatch: {}

jobs:
  fingerprint:
    name: Fingerprint
    type: fingerprint
    environment: production

  get_android_build:
    name: Check for existing Android build
    needs: [fingerprint]
    type: get-build
    params:
      platform: android
      profile: production
      distribution: store
      fingerprint_hash: ${{ needs.fingerprint.outputs.android_fingerprint_hash }}

  get_ios_build:
    name: Check for existing iOS build
    needs: [fingerprint]
    type: get-build
    params:
      platform: ios
      profile: production
      distribution: store
      fingerprint_hash: ${{ needs.fingerprint.outputs.ios_fingerprint_hash }}

  publish_android_update:
    name: Publish Android update (OTA)
    needs: [get_android_build]
    if: ${{ needs.get_android_build.outputs.build_id }}
    type: update
    environment: production
    params:
      channel: production
      platform: android

  publish_ios_update:
    name: Publish iOS update (OTA)
    needs: [get_ios_build]
    if: ${{ needs.get_ios_build.outputs.build_id }}
    type: update
    environment: production
    params:
      channel: production
      platform: ios

  build_android:
    name: Build Android
    needs: [get_android_build]
    if: ${{ !needs.get_android_build.outputs.build_id }}
    type: build
    params:
      platform: android
      profile: production

  build_ios:
    name: Build iOS
    needs: [get_ios_build]
    if: ${{ !needs.get_ios_build.outputs.build_id }}
    type: build
    params:
      platform: ios
      profile: production

  approve_android_submission:
    name: Approve Android store submission
    needs: [build_android]
    type: require-approval

  approve_ios_submission:
    name: Approve iOS store submission
    needs: [build_ios]
    type: require-approval

  submit_android:
    name: Submit to Play Store
    needs: [build_android, approve_android_submission]
    type: submit
    params:
      build_id: ${{ needs.build_android.outputs.build_id }}
      profile: production

  submit_ios:
    name: Submit to App Store
    needs: [build_ios, approve_ios_submission]
    type: submit
    params:
      build_id: ${{ needs.build_ios.outputs.build_id }}
      profile: production
